<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HWPX 구조 디버깅</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .section { margin: 20px 0; border: 2px solid #333; padding: 15px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; max-height: 400px; }
        h3 { color: #d00; }
        .success { color: #0a0; }
        .error { color: #d00; }
    </style>
</head>
<body>
    <h1>📋 HWPX 구조 디버깅 도구</h1>
    <p>1. HWPX 파일을 선택하세요</p>
    <input type="file" id="fileInput" accept=".hwpx" />
    
    <div id="output"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const output = document.getElementById('output');
            output.innerHTML = '<h2>🔍 분석 중...</h2>';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);

                let html = `<h2 class="success">✅ ZIP 압축 해제 성공</h2>`;
                html += `<div class="section"><h3>📁 파일 목록 (${Object.keys(zip.files).length}개)</h3><pre>${Object.keys(zip.files).join('\n')}</pre></div>`;

                // Header.xml 확인
                if (zip.files['Contents/header.xml']) {
                    const headerXml = await zip.files['Contents/header.xml'].async('string');
                    html += `<div class="section"><h3>📄 header.xml (${headerXml.length} bytes)</h3>`;
                    html += `<pre>${escapeHtml(headerXml.substring(0, 2000))}...</pre></div>`;
                    
                    // binaryData 확인
                    if (headerXml.includes('<hc:binaryData')) {
                        html += `<p class="success">✅ binaryData 요소 있음</p>`;
                    } else {
                        html += `<p class="error">❌ binaryData 요소 없음!</p>`;
                    }
                }

                // Section0.xml 확인
                if (zip.files['Contents/section0.xml']) {
                    const sectionXml = await zip.files['Contents/section0.xml'].async('string');
                    html += `<div class="section"><h3>📄 section0.xml (${sectionXml.length} bytes)</h3>`;
                    html += `<pre>${escapeHtml(sectionXml.substring(0, 3000))}...</pre></div>`;
                    
                    // 구조 검증
                    const checks = [
                        { name: '<hs:sec>', exists: sectionXml.includes('<hs:sec') },
                        { name: '<hp:secPr>', exists: sectionXml.includes('<hp:secPr') },
                        { name: '<hp:ctrl>', exists: sectionXml.includes('<hp:ctrl>') },
                        { name: '<hp:colPr>', exists: sectionXml.includes('<hp:colPr') },
                        { name: '<hp:tbl>', exists: sectionXml.includes('<hp:tbl') },
                        { name: '<hp:tc>', exists: sectionXml.includes('<hp:tc') },
                        { name: '<hp:subList>', exists: sectionXml.includes('<hp:subList') },
                        { name: '<hp:linesegarray>', exists: sectionXml.includes('<hp:linesegarray>') },
                    ];
                    
                    html += `<h4>구조 검증:</h4><ul>`;
                    checks.forEach(check => {
                        html += `<li class="${check.exists ? 'success' : 'error'}">${check.exists ? '✅' : '❌'} ${check.name}</li>`;
                    });
                    html += `</ul>`;
                    
                    // 첫 번째 <hp:p> 태그의 구조 확인
                    const firstPMatch = sectionXml.match(/<hp:p[^>]*>[\s\S]*?<\/hp:p>/);
                    if (firstPMatch) {
                        html += `<h4>첫 번째 &lt;hp:p&gt; 구조:</h4><pre>${escapeHtml(firstPMatch[0].substring(0, 1500))}</pre>`;
                    }
                }

                // BinData 폴더 확인
                const binDataFiles = Object.keys(zip.files).filter(name => name.startsWith('BinData/'));
                html += `<div class="section"><h3>🖼️ BinData 파일 (${binDataFiles.length}개)</h3>`;
                html += `<ul>`;
                binDataFiles.forEach(name => {
                    html += `<li>${name} (${zip.files[name]._data?.byteLength || 'unknown'} bytes)</li>`;
                });
                html += `</ul></div>`;

                output.innerHTML = html;
            } catch (error) {
                output.innerHTML = `<div class="error"><h2>❌ 오류 발생</h2><pre>${error.stack}</pre></div>`;
            }
        });

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
