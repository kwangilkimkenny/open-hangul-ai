<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Family Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-font {
            min-width: 100px;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 200px;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .warning {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Font Family Command Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드 (다양한 텍스트 포함)</li>
                <li>텍스트 선택</li>
                <li>글꼴 종류 변경 (드롭다운 또는 빠른 설정 버튼)</li>
                <li>글꼴 변경 확인</li>
                <li>Undo/Redo 테스트</li>
            </ol>
        </div>

        <div class="toolbar">
            <button id="btn-load">1. 테스트 문서 로드</button>

            <div class="toolbar-section" id="font-family-section" style="display: none;">
                <span class="toolbar-label">글꼴:</span>
                <select id="select-font-family" disabled>
                    <optgroup label="한글 글꼴">
                        <option value="맑은 고딕">맑은 고딕</option>
                        <option value="나눔고딕">나눔고딕</option>
                        <option value="나눔명조">나눔명조</option>
                        <option value="바탕">바탕</option>
                        <option value="돋움">돋움</option>
                        <option value="궁서">궁서</option>
                    </optgroup>
                    <optgroup label="영문 글꼴">
                        <option value="Arial" selected>Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Tahoma">Tahoma</option>
                    </optgroup>
                    <optgroup label="기타">
                        <option value="monospace">Monospace</option>
                        <option value="sans-serif">Sans-serif</option>
                        <option value="serif">Serif</option>
                    </optgroup>
                </select>
            </div>

            <div class="toolbar-section" id="preset-section" style="display: none;">
                <span class="toolbar-label">빠른 설정:</span>
                <button id="btn-font-arial" class="btn-font" disabled>Arial</button>
                <button id="btn-font-malgun" class="btn-font" disabled>맑은 고딕</button>
                <button id="btn-font-nanum" class="btn-font" disabled>나눔고딕</button>
                <button id="btn-font-times" class="btn-font" disabled>Times New Roman</button>
            </div>

            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;

        const buttons = {
            load: document.getElementById('btn-load'),
            fontArial: document.getElementById('btn-font-arial'),
            fontMalgun: document.getElementById('btn-font-malgun'),
            fontNanum: document.getElementById('btn-font-nanum'),
            fontTimes: document.getElementById('btn-font-times'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const selectFontFamily = document.getElementById('select-font-family');
        const statusDiv = document.getElementById('status');

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('테스트 문서 로드 중...');

                // 글꼴 테스트용 문서 생성
                const testDocument = {
                    header: { title: 'Font Family Test Document' },
                    sections: [{
                        paragraphs: [
                            {
                                text: 'Default Font: This is a paragraph with default font.',
                                runs: [{
                                    text: 'Default Font: This is a paragraph with default font.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: '한글 텍스트: 맑은 고딕, 나눔고딕 등의 한글 글꼴을 테스트할 수 있습니다.',
                                runs: [{
                                    text: '한글 텍스트: 맑은 고딕, 나눔고딕 등의 한글 글꼴을 테스트할 수 있습니다.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'English Text: You can test various English fonts like Arial, Times New Roman, Georgia.',
                                runs: [{
                                    text: 'English Text: You can test various English fonts like Arial, Times New Roman, Georgia.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'Mixed Text: 한글과 English를 섞어서 사용할 수도 있습니다.',
                                runs: [{
                                    text: 'Mixed Text: 한글과 English를 섞어서 사용할 수도 있습니다.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'The quick brown fox jumps over the lazy dog. 다람쥐 헌 쳇바퀴에 타고파.',
                                runs: [{
                                    text: 'The quick brown fox jumps over the lazy dog. 다람쥐 헌 쳇바퀴에 타고파.',
                                    style: { fontSize: '16pt' }
                                }]
                            },
                            {
                                text: 'Select any text and change its font using the toolbar above!',
                                runs: [{
                                    text: 'Select any text and change its font using the toolbar above!',
                                    style: { fontSize: '14pt' }
                                }]
                            }
                        ]
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(testDocument);

                // 커서 초기화
                await new Promise(resolve => setTimeout(resolve, 500));
                const cursor = viewer.getCursor();
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus('✅ 문서 로드 완료');
                updateStatus('💡 텍스트를 선택하고 글꼴을 변경해보세요!', 'warning');

                buttons.load.disabled = true;
                document.getElementById('font-family-section').style.display = 'flex';
                document.getElementById('preset-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';

                selectFontFamily.disabled = false;
                enableButtons('fontArial', 'fontMalgun', 'fontNanum', 'fontTimes', 'undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 글꼴 선택
        selectFontFamily.addEventListener('change', () => {
            try {
                const fontFamily = selectFontFamily.value;
                viewer.command.setFontFamily(fontFamily);
                updateStatus(`✅ 글꼴 변경: ${fontFamily}`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 빠른 설정 버튼들
        buttons.fontArial.addEventListener('click', () => {
            try {
                viewer.command.setFontFamily('Arial');
                updateStatus('✅ 글꼴: Arial');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.fontMalgun.addEventListener('click', () => {
            try {
                viewer.command.setFontFamily('맑은 고딕');
                updateStatus('✅ 글꼴: 맑은 고딕');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.fontNanum.addEventListener('click', () => {
            try {
                viewer.command.setFontFamily('나눔고딕');
                updateStatus('✅ 글꼴: 나눔고딕');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.fontTimes.addEventListener('click', () => {
            try {
                viewer.command.setFontFamily('Times New Roman');
                updateStatus('✅ 글꼴: Times New Roman');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        updateStatus('준비 완료. "1. 테스트 문서 로드" 버튼을 클릭하세요.');
        updateStatus('💡 문서 로드 후 텍스트를 드래그로 선택하고 글꼴을 변경하세요.', 'warning');
    </script>
</body>
</html>
