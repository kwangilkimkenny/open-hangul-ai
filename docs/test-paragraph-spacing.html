<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Spacing Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-spacing {
            min-width: 60px;
        }

        input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 70px;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .warning {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📐 Paragraph Spacing (단락 간격) Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드 (다양한 단락 간격의 예제 포함)</li>
                <li>단락에 커서 위치 또는 여러 단락 선택</li>
                <li>단락 앞/뒤 간격 버튼 클릭 또는 커스텀 값 입력</li>
                <li>단락 간격 변경 확인</li>
                <li>Undo/Redo 테스트</li>
            </ol>
            <div style="margin-top: 12px; padding: 8px; background: #fff3cd; border-radius: 4px;">
                <strong>💡 Tip:</strong> 단락 간격은 단락과 단락 사이의 여백입니다. 줄 간격은 단락 내 줄 사이의 간격입니다.
            </div>
        </div>

        <div class="toolbar">
            <button id="btn-load">1. 테스트 문서 로드</button>

            <div class="toolbar-section" id="before-section" style="display: none;">
                <span class="toolbar-label">단락 앞:</span>
                <button class="btn-spacing" id="btn-before-0" disabled>0pt</button>
                <button class="btn-spacing" id="btn-before-6" disabled>6pt</button>
                <button class="btn-spacing" id="btn-before-12" disabled>12pt</button>
                <button class="btn-spacing" id="btn-before-18" disabled>18pt</button>
            </div>

            <div class="toolbar-section" id="after-section" style="display: none;">
                <span class="toolbar-label">단락 뒤:</span>
                <button class="btn-spacing" id="btn-after-0" disabled>0pt</button>
                <button class="btn-spacing" id="btn-after-6" disabled>6pt</button>
                <button class="btn-spacing" id="btn-after-12" disabled>12pt</button>
                <button class="btn-spacing" id="btn-after-18" disabled>18pt</button>
            </div>

            <div class="toolbar-section" id="custom-section" style="display: none;">
                <span class="toolbar-label">커스텀:</span>
                <label style="font-size: 12px; margin-right: 4px;">앞:</label>
                <input type="number" id="input-before" min="0" max="100" step="1" value="0" disabled>
                <label style="font-size: 12px; margin-right: 4px;">뒤:</label>
                <input type="number" id="input-after" min="0" max="100" step="1" value="0" disabled>
                <button id="btn-apply-custom" disabled>적용</button>
            </div>

            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;

        const buttons = {
            load: document.getElementById('btn-load'),
            before0: document.getElementById('btn-before-0'),
            before6: document.getElementById('btn-before-6'),
            before12: document.getElementById('btn-before-12'),
            before18: document.getElementById('btn-before-18'),
            after0: document.getElementById('btn-after-0'),
            after6: document.getElementById('btn-after-6'),
            after12: document.getElementById('btn-after-12'),
            after18: document.getElementById('btn-after-18'),
            applyCustom: document.getElementById('btn-apply-custom'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const inputBefore = document.getElementById('input-before');
        const inputAfter = document.getElementById('input-after');
        const statusDiv = document.getElementById('status');

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('테스트 문서 로드 중...');

                // 단락 간격 테스트용 문서 생성
                const testDocument = {
                    header: { title: 'Paragraph Spacing Test Document' },
                    sections: [{
                        paragraphs: [
                            {
                                text: 'Paragraph 1: No spacing (0pt before, 0pt after)',
                                runs: [{
                                    text: 'Paragraph 1: No spacing (0pt before, 0pt after)',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '0px 0 0px 0' }
                            },
                            {
                                text: 'Paragraph 2: No spacing',
                                runs: [{
                                    text: 'Paragraph 2: No spacing',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '0px 0 0px 0' }
                            },
                            {
                                text: 'Paragraph 3: 6pt before, 6pt after',
                                runs: [{
                                    text: 'Paragraph 3: 6pt before, 6pt after',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '8px 0 8px 0' }
                            },
                            {
                                text: 'Paragraph 4: 6pt before, 6pt after',
                                runs: [{
                                    text: 'Paragraph 4: 6pt before, 6pt after',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '8px 0 8px 0' }
                            },
                            {
                                text: 'Paragraph 5: 12pt before, 12pt after',
                                runs: [{
                                    text: 'Paragraph 5: 12pt before, 12pt after',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '16px 0 16px 0' }
                            },
                            {
                                text: 'Paragraph 6: Large spacing (18pt before, 18pt after)',
                                runs: [{
                                    text: 'Paragraph 6: Large spacing (18pt before, 18pt after)',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '24px 0 24px 0' }
                            },
                            {
                                text: 'Paragraph 7: Asymmetric spacing (0pt before, 12pt after)',
                                runs: [{
                                    text: 'Paragraph 7: Asymmetric spacing (0pt before, 12pt after)',
                                    style: { fontSize: '14pt' }
                                }],
                                style: { margin: '0px 0 16px 0' }
                            },
                            {
                                text: 'Paragraph 8: Korean text (한글 텍스트): 단락 간격은 단락과 단락 사이의 여백을 조절합니다.',
                                runs: [{
                                    text: 'Paragraph 8: Korean text (한글 텍스트): 단락 간격은 단락과 단락 사이의 여백을 조절합니다.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'Click on any paragraph and change its spacing using the toolbar!',
                                runs: [{
                                    text: 'Click on any paragraph and change its spacing using the toolbar!',
                                    style: { fontSize: '14pt', color: '#666' }
                                }]
                            }
                        ]
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(testDocument);

                // 커서 초기화
                await new Promise(resolve => setTimeout(resolve, 500));
                const cursor = viewer.getCursor();
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus('✅ 문서 로드 완료');
                updateStatus('💡 단락을 클릭하고 단락 간격을 변경해보세요!', 'warning');

                buttons.load.disabled = true;
                document.getElementById('before-section').style.display = 'flex';
                document.getElementById('after-section').style.display = 'flex';
                document.getElementById('custom-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';

                inputBefore.disabled = false;
                inputAfter.disabled = false;
                enableButtons('before0', 'before6', 'before12', 'before18',
                             'after0', 'after6', 'after12', 'after18',
                             'applyCustom', 'undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 단락 앞 간격 버튼들
        buttons.before0.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceBefore(0);
                updateStatus('✅ 단락 앞 간격: 0pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.before6.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceBefore(6);
                updateStatus('✅ 단락 앞 간격: 6pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.before12.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceBefore(12);
                updateStatus('✅ 단락 앞 간격: 12pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.before18.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceBefore(18);
                updateStatus('✅ 단락 앞 간격: 18pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 단락 뒤 간격 버튼들
        buttons.after0.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceAfter(0);
                updateStatus('✅ 단락 뒤 간격: 0pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.after6.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceAfter(6);
                updateStatus('✅ 단락 뒤 간격: 6pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.after12.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceAfter(12);
                updateStatus('✅ 단락 뒤 간격: 12pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.after18.addEventListener('click', () => {
            try {
                viewer.command.paragraphSpaceAfter(18);
                updateStatus('✅ 단락 뒤 간격: 18pt');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 커스텀 값 적용
        buttons.applyCustom.addEventListener('click', () => {
            try {
                const before = parseInt(inputBefore.value) || 0;
                const after = parseInt(inputAfter.value) || 0;
                viewer.command.paragraphSpacing(before, after);
                updateStatus(`✅ 단락 간격 적용: 앞 ${before}pt, 뒤 ${after}pt`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        updateStatus('준비 완료. "1. 테스트 문서 로드" 버튼을 클릭하세요.');
        updateStatus('💡 문서 로드 후 단락을 클릭하고 단락 간격 버튼을 클릭하세요.', 'warning');
    </script>
</body>
</html>
