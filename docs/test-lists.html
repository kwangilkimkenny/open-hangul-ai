<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-list {
            min-width: 80px;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .warning {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lists (글머리 기호 & 번호 매기기) Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드</li>
                <li>단락에 커서 위치 또는 여러 단락 선택</li>
                <li>글머리 기호 또는 번호 매기기 적용</li>
                <li>들여쓰기 증가/감소로 레벨 조정</li>
                <li>목록 제거</li>
                <li>다양한 번호 형식 테스트 (1,2,3 / a,b,c / I,II,III 등)</li>
                <li>Undo/Redo 테스트</li>
            </ol>
        </div>

        <div class="toolbar">
            <button id="btn-load">1. 테스트 문서 로드</button>

            <div class="toolbar-section" id="bullet-section" style="display: none;">
                <span class="toolbar-label">글머리 기호:</span>
                <button class="btn-list" id="btn-bullet" title="● 글머리 기호" disabled>● 기본</button>
                <button class="btn-list" id="btn-circle" title="○ 원형" disabled>○ 원형</button>
                <button class="btn-list" id="btn-square" title="■ 사각형" disabled>■ 사각형</button>
            </div>

            <div class="toolbar-section" id="number-section" style="display: none;">
                <span class="toolbar-label">번호 매기기:</span>
                <button class="btn-list" id="btn-decimal" title="1, 2, 3..." disabled>1,2,3</button>
                <button class="btn-list" id="btn-alpha" title="a, b, c..." disabled>a,b,c</button>
                <button class="btn-list" id="btn-Alpha" title="A, B, C..." disabled>A,B,C</button>
                <button class="btn-list" id="btn-roman" title="i, ii, iii..." disabled>i,ii,iii</button>
                <button class="btn-list" id="btn-Roman" title="I, II, III..." disabled>I,II,III</button>
            </div>

            <div class="toolbar-section" id="indent-section" style="display: none;">
                <span class="toolbar-label">들여쓰기:</span>
                <button id="btn-increase-indent" title="들여쓰기 증가" disabled>→ 증가</button>
                <button id="btn-decrease-indent" title="들여쓰기 감소" disabled>← 감소</button>
            </div>

            <div class="toolbar-section" id="remove-section" style="display: none;">
                <button id="btn-remove-list" disabled>❌ 목록 제거</button>
            </div>

            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;

        const buttons = {
            load: document.getElementById('btn-load'),
            bullet: document.getElementById('btn-bullet'),
            circle: document.getElementById('btn-circle'),
            square: document.getElementById('btn-square'),
            decimal: document.getElementById('btn-decimal'),
            alpha: document.getElementById('btn-alpha'),
            Alpha: document.getElementById('btn-Alpha'),
            roman: document.getElementById('btn-roman'),
            Roman: document.getElementById('btn-Roman'),
            increaseIndent: document.getElementById('btn-increase-indent'),
            decreaseIndent: document.getElementById('btn-decrease-indent'),
            removeList: document.getElementById('btn-remove-list'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const statusDiv = document.getElementById('status');

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('테스트 문서 로드 중...');

                // 목록 테스트용 문서 생성
                const testDocument = {
                    header: { title: 'Lists Test Document' },
                    sections: [{
                        paragraphs: [
                            {
                                text: 'Plain paragraph without any list formatting.',
                                runs: [{
                                    text: 'Plain paragraph without any list formatting.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'Bulleted item 1',
                                runs: [{ text: 'Bulleted item 1', style: { fontSize: '14pt' } }],
                                numbering: {
                                    id: 'list-1',
                                    level: 0,
                                    definition: {
                                        start: 1,
                                        levels: [{
                                            level: 0,
                                            format: 'BULLET',
                                            numberFormat: '●',
                                            indent: 0
                                        }]
                                    }
                                }
                            },
                            {
                                text: 'Bulleted item 2',
                                runs: [{ text: 'Bulleted item 2', style: { fontSize: '14pt' } }],
                                numbering: {
                                    id: 'list-1',
                                    level: 0,
                                    definition: {
                                        start: 1,
                                        levels: [{
                                            level: 0,
                                            format: 'BULLET',
                                            numberFormat: '●',
                                            indent: 0
                                        }]
                                    }
                                }
                            },
                            {
                                text: 'Numbered item 1',
                                runs: [{ text: 'Numbered item 1', style: { fontSize: '14pt' } }],
                                numbering: {
                                    id: 'list-2',
                                    level: 0,
                                    definition: {
                                        start: 1,
                                        levels: [{
                                            level: 0,
                                            format: 'DECIMAL',
                                            numberFormat: '%d.',
                                            indent: 0
                                        }]
                                    }
                                }
                            },
                            {
                                text: 'Numbered item 2',
                                runs: [{ text: 'Numbered item 2', style: { fontSize: '14pt' } }],
                                numbering: {
                                    id: 'list-2',
                                    level: 0,
                                    definition: {
                                        start: 1,
                                        levels: [{
                                            level: 0,
                                            format: 'DECIMAL',
                                            numberFormat: '%d.',
                                            indent: 0
                                        }]
                                    }
                                }
                            },
                            {
                                text: 'Numbered item 3',
                                runs: [{ text: 'Numbered item 3', style: { fontSize: '14pt' } }],
                                numbering: {
                                    id: 'list-2',
                                    level: 0,
                                    definition: {
                                        start: 1,
                                        levels: [{
                                            level: 0,
                                            format: 'DECIMAL',
                                            numberFormat: '%d.',
                                            indent: 0
                                        }]
                                    }
                                }
                            },
                            {
                                text: 'Click on any paragraph and apply list formatting using the toolbar!',
                                runs: [{
                                    text: 'Click on any paragraph and apply list formatting using the toolbar!',
                                    style: { fontSize: '14pt', color: '#666' }
                                }]
                            },
                            {
                                text: 'You can also select multiple paragraphs to apply list formatting to all of them.',
                                runs: [{
                                    text: 'You can also select multiple paragraphs to apply list formatting to all of them.',
                                    style: { fontSize: '13pt', color: '#888' }
                                }]
                            }
                        ]
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(testDocument);

                // 커서 초기화
                await new Promise(resolve => setTimeout(resolve, 500));
                const cursor = viewer.getCursor();
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus('✅ 문서 로드 완료');
                updateStatus('💡 단락을 클릭하거나 여러 단락을 선택한 후 목록 버튼을 클릭하세요!', 'warning');

                buttons.load.disabled = true;
                document.getElementById('bullet-section').style.display = 'flex';
                document.getElementById('number-section').style.display = 'flex';
                document.getElementById('indent-section').style.display = 'flex';
                document.getElementById('remove-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';

                enableButtons('bullet', 'circle', 'square', 'decimal', 'alpha', 'Alpha', 'roman', 'Roman',
                             'increaseIndent', 'decreaseIndent', 'removeList', 'undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 글머리 기호 버튼들
        buttons.bullet.addEventListener('click', () => {
            try {
                viewer.command.bulletList('bullet');
                updateStatus('✅ 글머리 기호 적용: ●');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.circle.addEventListener('click', () => {
            try {
                viewer.command.bulletList('circle');
                updateStatus('✅ 글머리 기호 적용: ○');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.square.addEventListener('click', () => {
            try {
                viewer.command.bulletList('square');
                updateStatus('✅ 글머리 기호 적용: ■');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 번호 매기기 버튼들
        buttons.decimal.addEventListener('click', () => {
            try {
                viewer.command.numberedList('decimal');
                updateStatus('✅ 번호 매기기 적용: 1, 2, 3...');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.alpha.addEventListener('click', () => {
            try {
                viewer.command.numberedList('lower-alpha');
                updateStatus('✅ 번호 매기기 적용: a, b, c...');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.Alpha.addEventListener('click', () => {
            try {
                viewer.command.numberedList('upper-alpha');
                updateStatus('✅ 번호 매기기 적용: A, B, C...');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.roman.addEventListener('click', () => {
            try {
                viewer.command.numberedList('lower-roman');
                updateStatus('✅ 번호 매기기 적용: i, ii, iii...');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.Roman.addEventListener('click', () => {
            try {
                viewer.command.numberedList('upper-roman');
                updateStatus('✅ 번호 매기기 적용: I, II, III...');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 들여쓰기 버튼들
        buttons.increaseIndent.addEventListener('click', () => {
            try {
                viewer.command.increaseIndent();
                updateStatus('✅ 들여쓰기 증가');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.decreaseIndent.addEventListener('click', () => {
            try {
                viewer.command.decreaseIndent();
                updateStatus('✅ 들여쓰기 감소');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 목록 제거 버튼
        buttons.removeList.addEventListener('click', () => {
            try {
                viewer.command.removeList();
                updateStatus('✅ 목록 제거');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        updateStatus('준비 완료. "1. 테스트 문서 로드" 버튼을 클릭하세요.');
        updateStatus('💡 문서 로드 후 단락을 클릭하거나 선택한 후 목록 버튼을 클릭하세요.', 'warning');
    </script>
</body>
</html>
