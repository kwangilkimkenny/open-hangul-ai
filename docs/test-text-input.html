<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Input Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .test-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 400px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Text Input Command Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드</li>
                <li>커서 표시 및 위치 설정</li>
                <li>텍스트 입력 명령 실행 (insertText)</li>
                <li>Backspace/Delete 명령 실행</li>
                <li>Enter 명령 실행</li>
                <li>Undo/Redo 테스트</li>
            </ol>
        </div>

        <div class="test-controls">
            <button id="btn-load">1. 문서 로드</button>
            <button id="btn-show-cursor" disabled>2. 커서 표시</button>
            <button id="btn-insert-text" disabled>3. 텍스트 삽입</button>
            <button id="btn-delete-backward" disabled>4. Backspace</button>
            <button id="btn-delete-forward" disabled>5. Delete</button>
            <button id="btn-line-break" disabled>6. Enter</button>
            <button id="btn-undo" disabled>7. Undo</button>
            <button id="btn-redo" disabled>8. Redo</button>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;
        let currentStep = 0;

        const buttons = {
            load: document.getElementById('btn-load'),
            showCursor: document.getElementById('btn-show-cursor'),
            insertText: document.getElementById('btn-insert-text'),
            deleteBackward: document.getElementById('btn-delete-backward'),
            deleteForward: document.getElementById('btn-delete-forward'),
            lineBreak: document.getElementById('btn-line-break'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const statusDiv = document.getElementById('status');

        function updateStatus(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableNextButton() {
            const buttonOrder = ['load', 'showCursor', 'insertText', 'deleteBackward', 'deleteForward', 'lineBreak', 'undo', 'redo'];
            if (currentStep < buttonOrder.length - 1) {
                currentStep++;
                buttons[buttonOrder[currentStep]].disabled = false;
            }
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('문서 로드 중...');

                // 테스트용 간단한 문서 생성
                const testDocument = {
                    header: {
                        title: 'Text Input Test Document'
                    },
                    sections: [
                        {
                            paragraphs: [
                                {
                                    text: 'Hello World',
                                    runs: [{ text: 'Hello World' }]
                                }
                            ]
                        }
                    ]
                };

                viewer = new HWPXViewer('viewer-container', {
                    editable: true
                });

                await viewer.loadDocument(testDocument);
                updateStatus('✅ 문서 로드 완료');

                buttons.load.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 2. 커서 표시
        buttons.showCursor.addEventListener('click', async () => {
            try {
                updateStatus('커서 초기화 중...');

                const cursor = viewer.getCursor();
                const positionManager = viewer.getPositionManager();

                // Position 계산 대기
                await new Promise(resolve => setTimeout(resolve, 500));

                if (!positionManager.isPositionReady()) {
                    throw new Error('PositionManager가 준비되지 않았습니다');
                }

                // 커서를 첫 번째 위치에 표시
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus(`✅ 커서 표시 (위치: 0)`);

                buttons.showCursor.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 3. 텍스트 삽입
        buttons.insertText.addEventListener('click', () => {
            try {
                const cursor = viewer.getCursor();
                const beforeIndex = cursor.getCursorIndex();

                updateStatus(`텍스트 삽입 중... (현재 위치: ${beforeIndex})`);

                // Command API를 통해 텍스트 삽입
                viewer.command.insertText('TEST');

                const afterIndex = cursor.getCursorIndex();
                updateStatus(`✅ 텍스트 삽입 완료 (새 위치: ${afterIndex})`);

                buttons.insertText.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 4. Backspace
        buttons.deleteBackward.addEventListener('click', () => {
            try {
                const cursor = viewer.getCursor();
                const beforeIndex = cursor.getCursorIndex();

                updateStatus(`Backspace 실행 중... (현재 위치: ${beforeIndex})`);

                viewer.command.deleteBackward();

                const afterIndex = cursor.getCursorIndex();
                updateStatus(`✅ Backspace 완료 (새 위치: ${afterIndex})`);

                buttons.deleteBackward.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 5. Delete
        buttons.deleteForward.addEventListener('click', () => {
            try {
                const cursor = viewer.getCursor();
                const beforeIndex = cursor.getCursorIndex();

                updateStatus(`Delete 실행 중... (현재 위치: ${beforeIndex})`);

                viewer.command.deleteForward();

                const afterIndex = cursor.getCursorIndex();
                updateStatus(`✅ Delete 완료 (새 위치: ${afterIndex})`);

                buttons.deleteForward.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 6. Enter (줄바꿈)
        buttons.lineBreak.addEventListener('click', () => {
            try {
                const cursor = viewer.getCursor();
                const beforeIndex = cursor.getCursorIndex();

                updateStatus(`줄바꿈 삽입 중... (현재 위치: ${beforeIndex})`);

                viewer.command.insertLineBreak();

                const afterIndex = cursor.getCursorIndex();
                updateStatus(`✅ 줄바꿈 삽입 완료 (새 위치: ${afterIndex})`);

                buttons.lineBreak.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 7. Undo
        buttons.undo.addEventListener('click', () => {
            try {
                updateStatus('Undo 실행 중...');

                const success = viewer.command.undo();

                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다');
                }

                buttons.undo.disabled = true;
                enableNextButton();
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        // 8. Redo
        buttons.redo.addEventListener('click', () => {
            try {
                updateStatus('Redo 실행 중...');

                const success = viewer.command.redo();

                if (success) {
                    updateStatus('✅ Redo 완료');
                    updateStatus('🎉 모든 테스트 완료!');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, true);
            }
        });

        updateStatus('준비 완료. "1. 문서 로드" 버튼을 클릭하세요.');
    </script>
</body>
</html>
