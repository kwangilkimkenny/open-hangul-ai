<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Alignment Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-align {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-align:hover {
            background: #f5f5f5;
            border-color: #2196F3;
        }

        .btn-align.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .warning {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬅️➡️ Text Alignment Command Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드 (여러 단락 포함)</li>
                <li>커서를 단락에 위치시키기</li>
                <li>정렬 버튼 클릭 또는 API 호출</li>
                <li>정렬 변경 확인</li>
                <li>Undo/Redo 테스트</li>
                <li>여러 단락 선택 후 일괄 정렬</li>
            </ol>
        </div>

        <div class="toolbar">
            <button id="btn-load">1. 테스트 문서 로드</button>

            <div class="toolbar-section" id="alignment-section" style="display: none;">
                <span class="toolbar-label">정렬:</span>
                <button class="btn-align" id="btn-align-left" title="왼쪽 정렬 (Ctrl+L)" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="4" width="16" height="2"/>
                        <rect x="2" y="8" width="12" height="2"/>
                        <rect x="2" y="12" width="14" height="2"/>
                        <rect x="2" y="16" width="10" height="2"/>
                    </svg>
                </button>
                <button class="btn-align" id="btn-align-center" title="가운데 정렬 (Ctrl+E)" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="4" width="16" height="2"/>
                        <rect x="4" y="8" width="12" height="2"/>
                        <rect x="3" y="12" width="14" height="2"/>
                        <rect x="5" y="16" width="10" height="2"/>
                    </svg>
                </button>
                <button class="btn-align" id="btn-align-right" title="오른쪽 정렬 (Ctrl+R)" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="4" width="16" height="2"/>
                        <rect x="6" y="8" width="12" height="2"/>
                        <rect x="4" y="12" width="14" height="2"/>
                        <rect x="8" y="16" width="10" height="2"/>
                    </svg>
                </button>
                <button class="btn-align" id="btn-align-justify" title="양쪽 정렬 (Ctrl+J)" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="4" width="16" height="2"/>
                        <rect x="2" y="8" width="16" height="2"/>
                        <rect x="2" y="12" width="16" height="2"/>
                        <rect x="2" y="16" width="16" height="2"/>
                    </svg>
                </button>
            </div>

            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;

        const buttons = {
            load: document.getElementById('btn-load'),
            alignLeft: document.getElementById('btn-align-left'),
            alignCenter: document.getElementById('btn-align-center'),
            alignRight: document.getElementById('btn-align-right'),
            alignJustify: document.getElementById('btn-align-justify'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const statusDiv = document.getElementById('status');

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        function setActiveAlignment(alignment) {
            Object.keys(buttons).forEach(key => {
                if (key.startsWith('align')) {
                    buttons[key].classList.remove('active');
                }
            });

            const alignmentMap = {
                'left': 'alignLeft',
                'center': 'alignCenter',
                'right': 'alignRight',
                'justify': 'alignJustify'
            };

            const buttonKey = alignmentMap[alignment];
            if (buttonKey && buttons[buttonKey]) {
                buttons[buttonKey].classList.add('active');
            }
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('테스트 문서 로드 중...');

                // 정렬 테스트용 문서 생성
                const testDocument = {
                    header: { title: 'Text Alignment Test Document' },
                    sections: [{
                        paragraphs: [
                            {
                                text: 'Paragraph 1: This is a left-aligned paragraph by default.',
                                runs: [{ text: 'Paragraph 1: This is a left-aligned paragraph by default.' }]
                            },
                            {
                                text: 'Paragraph 2: This paragraph can be centered.',
                                runs: [{ text: 'Paragraph 2: This paragraph can be centered.' }]
                            },
                            {
                                text: 'Paragraph 3: This paragraph can be right-aligned.',
                                runs: [{ text: 'Paragraph 3: This paragraph can be right-aligned.' }]
                            },
                            {
                                text: 'Paragraph 4: This paragraph can be justified. Justified text spreads evenly across the line from left to right margins.',
                                runs: [{ text: 'Paragraph 4: This paragraph can be justified. Justified text spreads evenly across the line from left to right margins.' }]
                            },
                            {
                                text: 'Paragraph 5: You can select multiple paragraphs and align them all at once.',
                                runs: [{ text: 'Paragraph 5: You can select multiple paragraphs and align them all at once.' }]
                            }
                        ]
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(testDocument);

                // 커서 초기화
                await new Promise(resolve => setTimeout(resolve, 500));
                const cursor = viewer.getCursor();
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus('✅ 문서 로드 완료');
                updateStatus('💡 단락을 클릭하고 정렬 버튼을 눌러보세요!', 'warning');

                buttons.load.disabled = true;
                document.getElementById('alignment-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';
                enableButtons('alignLeft', 'alignCenter', 'alignRight', 'alignJustify', 'undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 정렬 버튼들
        buttons.alignLeft.addEventListener('click', () => {
            try {
                viewer.command.alignLeft();
                setActiveAlignment('left');
                updateStatus('✅ 왼쪽 정렬 적용');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.alignCenter.addEventListener('click', () => {
            try {
                viewer.command.alignCenter();
                setActiveAlignment('center');
                updateStatus('✅ 가운데 정렬 적용');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.alignRight.addEventListener('click', () => {
            try {
                viewer.command.alignRight();
                setActiveAlignment('right');
                updateStatus('✅ 오른쪽 정렬 적용');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.alignJustify.addEventListener('click', () => {
            try {
                viewer.command.alignJustify();
                setActiveAlignment('justify');
                updateStatus('✅ 양쪽 정렬 적용');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        updateStatus('준비 완료. "1. 테스트 문서 로드" 버튼을 클릭하세요.');
        updateStatus('💡 문서 로드 후 단락을 클릭하거나 여러 단락을 선택한 후 정렬 버튼을 클릭하세요.', 'warning');
    </script>
</body>
</html>
