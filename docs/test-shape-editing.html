<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Editing Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.danger {
            background: #f44336;
        }

        button.danger:hover {
            background: #d32f2f;
        }

        button.success {
            background: #4CAF50;
        }

        button.success:hover {
            background: #388E3C;
        }

        input[type="number"], input[type="text"], input[type="color"], input[type="range"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="number"], input[type="text"] {
            width: 70px;
        }

        input[type="range"] {
            width: 120px;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success-text {
            color: #4CAF50;
            font-weight: bold;
        }

        .error-text {
            color: #f44336;
            font-weight: bold;
        }

        .warning-text {
            color: #ff9800;
            font-weight: bold;
        }

        .selected-shape {
            outline: 3px solid #2196F3;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔷 Shape Editing Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>도형 삽입 (사각형, 원, 선, 텍스트박스)</li>
                <li>도형 클릭으로 선택</li>
                <li>크기 조정, 위치 변경</li>
                <li>채우기 색상, 테두리 설정</li>
                <li>회전, 불투명도, 둥글기 조정</li>
                <li>텍스트 입력 (textbox)</li>
                <li>도형 삭제</li>
                <li>Undo/Redo 테스트</li>
            </ol>
            <div style="margin-top: 12px; padding: 8px; background: #fff3cd; border-radius: 4px;">
                <strong>💡 Tip:</strong> 도형을 클릭하면 선택됩니다. 선택된 도형에 대해 편집을 수행할 수 있습니다.
            </div>
        </div>

        <div class="toolbar">
            <!-- Insert Shape -->
            <div class="toolbar-section">
                <span class="toolbar-label">도형:</span>
                <button id="btn-rect" class="success">⬜ 사각형</button>
                <button id="btn-ellipse" class="success">⭕ 원</button>
                <button id="btn-line" class="success">➖ 선</button>
                <button id="btn-textbox" class="success">📝 텍스트박스</button>
            </div>

            <!-- Size -->
            <div class="toolbar-section" id="size-section" style="display: none;">
                <span class="toolbar-label">크기:</span>
                <input type="number" id="input-width" placeholder="너비" min="50" max="600" disabled>
                <span style="font-size: 12px;">x</span>
                <input type="number" id="input-height" placeholder="높이" min="50" max="600" disabled>
                <button id="btn-resize" disabled>적용</button>
            </div>

            <!-- Position -->
            <div class="toolbar-section" id="pos-section" style="display: none;">
                <span class="toolbar-label">위치:</span>
                <input type="number" id="input-x" placeholder="X" min="0" max="600" disabled>
                <input type="number" id="input-y" placeholder="Y" min="0" max="600" disabled>
                <button id="btn-set-pos" disabled>적용</button>
            </div>

            <!-- Colors -->
            <div class="toolbar-section" id="color-section" style="display: none;">
                <span class="toolbar-label">색상:</span>
                <label style="font-size: 12px;">채우기:</label>
                <input type="color" id="input-fill" value="#4CAF50" disabled>
                <button id="btn-set-fill" disabled>적용</button>
                <label style="font-size: 12px;">테두리:</label>
                <input type="color" id="input-stroke-color" value="#000000" disabled>
                <input type="number" id="input-stroke-width" min="0" max="10" value="2" style="width: 50px;" disabled>
                <span style="font-size: 12px;">px</span>
                <button id="btn-set-stroke" disabled>적용</button>
            </div>

            <!-- Rotate -->
            <div class="toolbar-section" id="rotate-section" style="display: none;">
                <span class="toolbar-label">회전:</span>
                <button id="btn-rotate-0" disabled>0°</button>
                <button id="btn-rotate-45" disabled>45°</button>
                <button id="btn-rotate-90" disabled>90°</button>
            </div>

            <!-- Style -->
            <div class="toolbar-section" id="style-section" style="display: none;">
                <span class="toolbar-label">스타일:</span>
                <label style="font-size: 12px;">불투명도:</label>
                <input type="range" id="input-opacity" min="0" max="100" value="100" disabled>
                <span id="opacity-value">100%</span>
                <label style="font-size: 12px;">둥글기:</label>
                <input type="range" id="input-radius" min="0" max="100" value="0" disabled>
                <span id="radius-value">0</span>
            </div>

            <!-- Text -->
            <div class="toolbar-section" id="text-section" style="display: none;">
                <span class="toolbar-label">텍스트:</span>
                <input type="text" id="input-text" placeholder="텍스트 입력" style="width: 150px;" disabled>
                <button id="btn-set-text" disabled>적용</button>
            </div>

            <!-- Delete -->
            <div class="toolbar-section" id="delete-section" style="display: none;">
                <button id="btn-delete" class="danger" disabled>🗑️ 삭제</button>
            </div>

            <!-- Undo/Redo -->
            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;
        let selectedShape = null;

        const buttons = {
            rect: document.getElementById('btn-rect'),
            ellipse: document.getElementById('btn-ellipse'),
            line: document.getElementById('btn-line'),
            textbox: document.getElementById('btn-textbox'),
            resize: document.getElementById('btn-resize'),
            setPos: document.getElementById('btn-set-pos'),
            setFill: document.getElementById('btn-set-fill'),
            setStroke: document.getElementById('btn-set-stroke'),
            rotate0: document.getElementById('btn-rotate-0'),
            rotate45: document.getElementById('btn-rotate-45'),
            rotate90: document.getElementById('btn-rotate-90'),
            setText: document.getElementById('btn-set-text'),
            delete: document.getElementById('btn-delete'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const inputs = {
            width: document.getElementById('input-width'),
            height: document.getElementById('input-height'),
            x: document.getElementById('input-x'),
            y: document.getElementById('input-y'),
            fill: document.getElementById('input-fill'),
            strokeColor: document.getElementById('input-stroke-color'),
            strokeWidth: document.getElementById('input-stroke-width'),
            opacity: document.getElementById('input-opacity'),
            radius: document.getElementById('input-radius'),
            text: document.getElementById('input-text')
        };

        const statusDiv = document.getElementById('status');
        const opacityValue = document.getElementById('opacity-value');
        const radiusValue = document.getElementById('radius-value');

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error-text' : type === 'warning' ? 'warning-text' : 'success-text';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        function clearSelection() {
            if (selectedShape) {
                selectedShape.classList.remove('selected-shape');
            }
            selectedShape = null;
            updateButtonStates();
        }

        function selectShape(shapeElement) {
            clearSelection();
            selectedShape = shapeElement;
            shapeElement.classList.add('selected-shape');
            updateButtonStates();
            updateStatus('도형 선택됨');
        }

        function updateButtonStates() {
            const hasSelection = selectedShape !== null;

            // Size, position, colors
            buttons.resize.disabled = !hasSelection;
            inputs.width.disabled = !hasSelection;
            inputs.height.disabled = !hasSelection;
            buttons.setPos.disabled = !hasSelection;
            inputs.x.disabled = !hasSelection;
            inputs.y.disabled = !hasSelection;
            buttons.setFill.disabled = !hasSelection;
            inputs.fill.disabled = !hasSelection;
            buttons.setStroke.disabled = !hasSelection;
            inputs.strokeColor.disabled = !hasSelection;
            inputs.strokeWidth.disabled = !hasSelection;

            // Rotate, style, text
            buttons.rotate0.disabled = !hasSelection;
            buttons.rotate45.disabled = !hasSelection;
            buttons.rotate90.disabled = !hasSelection;
            inputs.opacity.disabled = !hasSelection;
            inputs.radius.disabled = !hasSelection;
            buttons.setText.disabled = !hasSelection;
            inputs.text.disabled = !hasSelection;

            // Delete
            buttons.delete.disabled = !hasSelection;
        }

        function setupShapeSelection() {
            const shapes = document.querySelectorAll('.hwp-shape');
            shapes.forEach(shape => {
                shape.style.cursor = 'pointer';
                shape.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectShape(shape);
                });
            });
        }

        // Initialize viewer
        async function initViewer() {
            try {
                updateStatus('뷰어 초기화 중...');

                const emptyDocument = {
                    sections: [{
                        elements: []
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(emptyDocument);

                updateStatus('✅ 뷰어 초기화 완료');
                updateStatus('💡 도형을 삽입해보세요!', 'warning');

                // Show controls
                document.getElementById('size-section').style.display = 'flex';
                document.getElementById('pos-section').style.display = 'flex';
                document.getElementById('color-section').style.display = 'flex';
                document.getElementById('rotate-section').style.display = 'flex';
                document.getElementById('style-section').style.display = 'flex';
                document.getElementById('text-section').style.display = 'flex';
                document.getElementById('delete-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';

                enableButtons('undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        }

        // Insert shapes
        buttons.rect.addEventListener('click', async () => {
            try {
                updateStatus('사각형 삽입 중...');
                viewer.command.insertShape('rectangle', {
                    width: 200, height: 150, fillColor: '#4CAF50', strokeColor: '#000', strokeWidth: 2
                });
                await new Promise(resolve => setTimeout(resolve, 300));
                setupShapeSelection();
                updateStatus('✅ 사각형 삽입 완료');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.ellipse.addEventListener('click', async () => {
            try {
                updateStatus('원 삽입 중...');
                viewer.command.insertShape('ellipse', {
                    width: 150, height: 150, fillColor: '#2196F3', strokeColor: '#000', strokeWidth: 2
                });
                await new Promise(resolve => setTimeout(resolve, 300));
                setupShapeSelection();
                updateStatus('✅ 원 삽입 완료');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.line.addEventListener('click', async () => {
            try {
                updateStatus('선 삽입 중...');
                viewer.command.insertShape('line', {
                    x0: 0, y0: 0, x1: 200, y1: 100, strokeColor: '#000', strokeWidth: 3
                });
                await new Promise(resolve => setTimeout(resolve, 300));
                setupShapeSelection();
                updateStatus('✅ 선 삽입 완료');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.textbox.addEventListener('click', async () => {
            try {
                updateStatus('텍스트박스 삽입 중...');
                viewer.command.insertShape('textbox', {
                    width: 250, height: 100, fillColor: '#fff3cd', strokeColor: '#000', strokeWidth: 1,
                    text: 'Hello World', textAlign: 'center'
                });
                await new Promise(resolve => setTimeout(resolve, 300));
                setupShapeSelection();
                updateStatus('✅ 텍스트박스 삽입 완료');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Resize
        buttons.resize.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                const width = parseInt(inputs.width.value);
                const height = parseInt(inputs.height.value);
                if (!width || !height) {
                    updateStatus('⚠️ 너비와 높이를 입력하세요', 'warning');
                    return;
                }
                viewer.command.resizeShape(selectedShape, width, height);
                updateStatus(`✅ 도형 크기 조정: ${width}x${height}`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Position
        buttons.setPos.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                const x = parseInt(inputs.x.value) || 0;
                const y = parseInt(inputs.y.value) || 0;
                viewer.command.setShapePosition(selectedShape, x, y);
                updateStatus(`✅ 도형 위치: (${x}, ${y})`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Fill color
        buttons.setFill.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                const color = inputs.fill.value;
                viewer.command.setShapeFillColor(selectedShape, color);
                updateStatus(`✅ 채우기 색상: ${color}`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Stroke
        buttons.setStroke.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                const color = inputs.strokeColor.value;
                const width = parseInt(inputs.strokeWidth.value) || 1;
                viewer.command.setShapeStroke(selectedShape, color, width);
                updateStatus(`✅ 테두리: ${color}, ${width}px`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Rotate
        [0, 45, 90].forEach(degrees => {
            const btnName = `rotate${degrees}`;
            buttons[btnName].addEventListener('click', () => {
                try {
                    if (!selectedShape) return;
                    viewer.command.rotateShape(selectedShape, degrees);
                    updateStatus(`✅ 도형 회전: ${degrees}°`);
                } catch (error) {
                    updateStatus(`❌ 오류: ${error.message}`, 'error');
                }
            });
        });

        // Opacity
        inputs.opacity.addEventListener('input', (e) => {
            const opacity = e.target.value / 100;
            opacityValue.textContent = `${e.target.value}%`;
            if (selectedShape) {
                viewer.command.setShapeOpacity(selectedShape, opacity);
                updateStatus(`✅ 도형 불투명도: ${e.target.value}%`);
            }
        });

        // Border radius
        inputs.radius.addEventListener('input', (e) => {
            const radius = parseInt(e.target.value);
            radiusValue.textContent = radius;
            if (selectedShape) {
                viewer.command.setShapeBorderRadius(selectedShape, radius);
                updateStatus(`✅ 도형 둥글기: ${radius}`);
            }
        });

        // Text
        buttons.setText.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                const text = inputs.text.value;
                if (!text) {
                    updateStatus('⚠️ 텍스트를 입력하세요', 'warning');
                    return;
                }
                viewer.command.setShapeText(selectedShape, text);
                updateStatus(`✅ 텍스트 설정: ${text}`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Delete
        buttons.delete.addEventListener('click', () => {
            try {
                if (!selectedShape) return;
                viewer.command.deleteShape(selectedShape);
                clearSelection();
                updateStatus('✅ 도형 삭제 완료');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    setupShapeSelection();
                    clearSelection();
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    setupShapeSelection();
                    clearSelection();
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Clear selection on document click
        document.getElementById('viewer-container').addEventListener('click', (e) => {
            if (e.target.id === 'viewer-container' || e.target.classList.contains('hwp-page')) {
                clearSelection();
                updateStatus('선택 해제');
            }
        });

        // Initialize on load
        initViewer();
    </script>
</body>
</html>
