<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight Test - HWPX Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .toolbar {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toolbar-section::after {
            content: '';
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 8px;
        }

        .toolbar-section:last-child::after {
            display: none;
        }

        .toolbar-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-right: 4px;
        }

        button {
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #1976D2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-highlight {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .btn-highlight:hover {
            border-color: #333;
            transform: scale(1.05);
        }

        .btn-highlight.active {
            border-color: #2196F3;
            border-width: 3px;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        #viewer-container {
            border: 1px solid #ddd;
            min-height: 600px;
            border-radius: 4px;
            background: white;
            position: relative;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-item {
            margin: 4px 0;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .warning {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖍️ Highlight (형광펜) Command Test</h1>

        <div class="info">
            <strong>테스트 시나리오:</strong>
            <ol style="margin: 8px 0 0 0; padding-left: 20px;">
                <li>문서 로드 (다양한 텍스트 포함)</li>
                <li>텍스트 선택</li>
                <li>형광펜 색상 버튼 클릭 또는 커스텀 색상 선택</li>
                <li>배경색 적용 확인</li>
                <li>다른 색상으로 변경</li>
                <li>형광펜 제거 (Remove 버튼)</li>
                <li>Undo/Redo 테스트</li>
            </ol>
        </div>

        <div class="toolbar">
            <button id="btn-load">1. 테스트 문서 로드</button>

            <div class="toolbar-section" id="highlight-section" style="display: none;">
                <span class="toolbar-label">형광펜 색상:</span>
                <button class="btn-highlight" id="btn-yellow"
                        style="background-color: #ffff00;"
                        title="노란색" disabled></button>
                <button class="btn-highlight" id="btn-green"
                        style="background-color: #90EE90;"
                        title="연두색" disabled></button>
                <button class="btn-highlight" id="btn-cyan"
                        style="background-color: #87CEEB;"
                        title="하늘색" disabled></button>
                <button class="btn-highlight" id="btn-pink"
                        style="background-color: #FFB6C1;"
                        title="분홍색" disabled></button>
                <button class="btn-highlight" id="btn-orange"
                        style="background-color: #FFD700;"
                        title="주황색" disabled></button>
            </div>

            <div class="toolbar-section" id="custom-section" style="display: none;">
                <span class="toolbar-label">커스텀:</span>
                <div class="color-picker-wrapper">
                    <input type="color" id="color-picker" value="#ffff00" disabled>
                    <button id="btn-apply-custom" disabled>적용</button>
                </div>
            </div>

            <div class="toolbar-section" id="remove-section" style="display: none;">
                <button id="btn-remove" disabled>❌ 형광펜 제거</button>
            </div>

            <div class="toolbar-section" id="undo-section" style="display: none;">
                <button id="btn-undo" disabled>↶ Undo</button>
                <button id="btn-redo" disabled>↷ Redo</button>
            </div>
        </div>

        <div id="viewer-container"></div>

        <div class="status" id="status">
            <div class="status-item">상태: 대기 중...</div>
        </div>
    </div>

    <script type="module">
        import { HWPXViewer } from '../src/lib/vanilla/viewer.js';

        let viewer;
        let currentColor = null;

        const buttons = {
            load: document.getElementById('btn-load'),
            yellow: document.getElementById('btn-yellow'),
            green: document.getElementById('btn-green'),
            cyan: document.getElementById('btn-cyan'),
            pink: document.getElementById('btn-pink'),
            orange: document.getElementById('btn-orange'),
            applyCustom: document.getElementById('btn-apply-custom'),
            remove: document.getElementById('btn-remove'),
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        const colorPicker = document.getElementById('color-picker');
        const statusDiv = document.getElementById('status');

        const colors = {
            yellow: '#ffff00',
            green: '#90EE90',
            cyan: '#87CEEB',
            pink: '#FFB6C1',
            orange: '#FFD700'
        };

        function updateStatus(message, type = 'success') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success';
            statusDiv.innerHTML += `<div class="status-item ${className}">[${timestamp}] ${message}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        function enableButtons(...buttonNames) {
            buttonNames.forEach(name => {
                if (buttons[name]) {
                    buttons[name].disabled = false;
                }
            });
        }

        function setActiveColor(buttonName) {
            // 모든 버튼의 active 클래스 제거
            Object.keys(buttons).forEach(key => {
                if (key.startsWith('btn-') && buttons[key].classList) {
                    buttons[key].classList.remove('active');
                }
            });

            // 선택된 버튼에 active 클래스 추가
            if (buttonName && buttons[buttonName]) {
                buttons[buttonName].classList.add('active');
            }
        }

        function applyHighlight(color, colorName) {
            try {
                viewer.command.highlight(color);
                currentColor = color;
                updateStatus(`✅ 형광펜 적용: ${colorName} (${color})`);
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        }

        // 1. 문서 로드
        buttons.load.addEventListener('click', async () => {
            try {
                updateStatus('테스트 문서 로드 중...');

                // 형광펜 테스트용 문서 생성
                const testDocument = {
                    header: { title: 'Highlight Test Document' },
                    sections: [{
                        paragraphs: [
                            {
                                text: 'Plain text without any highlight.',
                                runs: [{
                                    text: 'Plain text without any highlight.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'Yellow highlight: This text has yellow background.',
                                runs: [{
                                    text: 'Yellow highlight: This text has yellow background.',
                                    style: { fontSize: '14pt', backgroundColor: '#ffff00' }
                                }]
                            },
                            {
                                text: 'Green highlight: This text has green background.',
                                runs: [{
                                    text: 'Green highlight: This text has green background.',
                                    style: { fontSize: '14pt', backgroundColor: '#90EE90' }
                                }]
                            },
                            {
                                text: 'Multiple colors: You can apply different highlight colors to different parts.',
                                runs: [{
                                    text: 'Multiple colors: You can apply ',
                                    style: { fontSize: '14pt' }
                                }, {
                                    text: 'different',
                                    style: { fontSize: '14pt', backgroundColor: '#FFB6C1' }
                                }, {
                                    text: ' highlight colors to ',
                                    style: { fontSize: '14pt' }
                                }, {
                                    text: 'different',
                                    style: { fontSize: '14pt', backgroundColor: '#87CEEB' }
                                }, {
                                    text: ' parts.',
                                    style: { fontSize: '14pt' }
                                }]
                            },
                            {
                                text: 'Select any text and apply highlight color using the toolbar above!',
                                runs: [{
                                    text: 'Select any text and apply highlight color using the toolbar above!',
                                    style: { fontSize: '14pt', color: '#666' }
                                }]
                            },
                            {
                                text: 'You can also remove highlight by clicking the "형광펜 제거" button.',
                                runs: [{
                                    text: 'You can also remove highlight by clicking the "형광펜 제거" button.',
                                    style: { fontSize: '13pt', color: '#888' }
                                }]
                            }
                        ]
                    }]
                };

                viewer = new HWPXViewer('viewer-container', { editable: true });
                await viewer.loadDocument(testDocument);

                // 커서 초기화
                await new Promise(resolve => setTimeout(resolve, 500));
                const cursor = viewer.getCursor();
                cursor.setCursorPosition(0);
                cursor.show();
                cursor.focus();

                updateStatus('✅ 문서 로드 완료');
                updateStatus('💡 텍스트를 선택하고 형광펜 색상을 선택하세요!', 'warning');

                buttons.load.disabled = true;
                document.getElementById('highlight-section').style.display = 'flex';
                document.getElementById('custom-section').style.display = 'flex';
                document.getElementById('remove-section').style.display = 'flex';
                document.getElementById('undo-section').style.display = 'flex';

                colorPicker.disabled = false;
                enableButtons('yellow', 'green', 'cyan', 'pink', 'orange', 'applyCustom', 'remove', 'undo', 'redo');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // 형광펜 색상 버튼들
        buttons.yellow.addEventListener('click', () => {
            setActiveColor('yellow');
            applyHighlight(colors.yellow, '노란색');
        });

        buttons.green.addEventListener('click', () => {
            setActiveColor('green');
            applyHighlight(colors.green, '연두색');
        });

        buttons.cyan.addEventListener('click', () => {
            setActiveColor('cyan');
            applyHighlight(colors.cyan, '하늘색');
        });

        buttons.pink.addEventListener('click', () => {
            setActiveColor('pink');
            applyHighlight(colors.pink, '분홍색');
        });

        buttons.orange.addEventListener('click', () => {
            setActiveColor('orange');
            applyHighlight(colors.orange, '주황색');
        });

        // 커스텀 색상 적용
        buttons.applyCustom.addEventListener('click', () => {
            const customColor = colorPicker.value;
            setActiveColor(null);
            applyHighlight(customColor, '커스텀');
        });

        // 형광펜 제거
        buttons.remove.addEventListener('click', () => {
            try {
                viewer.command.highlight(null);
                currentColor = null;
                setActiveColor(null);
                updateStatus('✅ 형광펜 제거');
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        // Undo/Redo
        buttons.undo.addEventListener('click', () => {
            try {
                const success = viewer.command.undo();
                if (success) {
                    updateStatus('✅ Undo 완료');
                } else {
                    updateStatus('⚠️ Undo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        buttons.redo.addEventListener('click', () => {
            try {
                const success = viewer.command.redo();
                if (success) {
                    updateStatus('✅ Redo 완료');
                } else {
                    updateStatus('⚠️ Redo 스택이 비어있습니다', 'warning');
                }
            } catch (error) {
                updateStatus(`❌ 오류: ${error.message}`, 'error');
            }
        });

        updateStatus('준비 완료. "1. 테스트 문서 로드" 버튼을 클릭하세요.');
        updateStatus('💡 문서 로드 후 텍스트를 드래그로 선택하고 형광펜 색상을 선택하세요.', 'warning');
    </script>
</body>
</html>
