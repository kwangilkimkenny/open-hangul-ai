# ============================================================
# KS X 6101 / HWPX Conformance Matrix
# ============================================================
# 한국어 워드프로세서 공식 기능 카탈로그를 코드화한 매트릭스.
# `scripts/conformance-report.mjs`가 이 파일을 읽어 점수/리포트를 생성한다.
#
# 필드:
#   category   - 기능 그룹 (Text / Layout / Object / Reference / Document)
#   feature    - 구체적 기능 이름
#   parser     - HWPX → 내부 모델 추출 상태 (supported|partial|missing)
#   renderer   - 내부 모델 → 화면 출력 상태 (supported|partial|missing)
#   roundtrip  - 모델 → HWPX 재기록 + 의미 동등 (supported|partial|missing)
#   priority   - 개선 우선순위 (P0=즉시, P1=다음 스프린트, P2=중기, P3=장기)
#   golden     - 연관된 tests/golden/ 하위 디렉토리 (선택)
# ============================================================

