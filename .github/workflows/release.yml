name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '18'

jobs:
  # 📋 릴리스 검증
  validate-release:
    name: 📋 Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version: ${{ steps.get-version.outputs.version }}
      prerelease: ${{ steps.check-prerelease.outputs.prerelease }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get version from tag
        id: get-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: 🔍 Check if prerelease
        id: check-prerelease
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "🧪 This is a prerelease"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "🎉 This is a stable release"
          fi

      - name: 📊 Validate changelog
        run: |
          if grep -q "## \[${{ steps.get-version.outputs.version }}\]" CHANGELOG.md; then
            echo "✅ Changelog entry found for version ${{ steps.get-version.outputs.version }}"
          else
            echo "❌ No changelog entry found for version ${{ steps.get-version.outputs.version }}"
            echo "Please add a changelog entry before releasing"
            exit 1
          fi

  # 🏗️ 빌드 및 테스트
  build-and-test:
    name: 🏗️ Build & Test for Release
    runs-on: ubuntu-latest
    needs: validate-release
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 💅 Lint
        run: npm run lint

      - name: 🧪 Run tests
        run: npm run test:run

      - name: 🏗️ Build application
        run: npm run build

      - name: 📦 Build library
        run: npm run build:lib

      - name: 📤 Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.validate-release.outputs.version }}
          path: |
            dist/
            hanview-react-dist/
          retention-days: 30

  # 📦 npm 패키지 준비 및 발행
  npm-publish:
    name: 📦 Publish to npm
    runs-on: ubuntu-latest
    needs: [validate-release, build-and-test]
    environment: npm-publish
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 📥 Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.validate-release.outputs.version }}

      - name: 📦 Prepare npm package
        run: |
          npm run build:lib
          node scripts/prepare-package.js

      - name: ✅ Verify package
        run: |
          cd hanview-react-dist
          npm pack --dry-run
          echo "✅ Package verification completed"

      - name: 🚀 Publish to npm
        run: |
          cd hanview-react-dist
          if [[ "${{ needs.validate-release.outputs.prerelease }}" == "true" ]]; then
            echo "📦 Publishing prerelease to npm with beta tag..."
            npm publish --tag beta
          else
            echo "📦 Publishing stable release to npm..."
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📊 Package info
        run: |
          echo "## 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Package**: https://www.npmjs.com/package/open-hangul-ai" >> $GITHUB_STEP_SUMMARY
          echo "📱 **Version**: ${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ **Tag**: ${{ needs.validate-release.outputs.prerelease == 'true' && 'beta' || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.validate-release.outputs.prerelease }}" == "true" ]]; then
            echo "npm install open-hangul-ai@beta" >> $GITHUB_STEP_SUMMARY
          else
            echo "npm install open-hangul-ai" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

  # 🎉 GitHub 릴리스 생성
  github-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-release, build-and-test, npm-publish]
    permissions:
      contents: write
      discussions: write
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate release notes
        id: release-notes
        run: |
          VERSION=${{ needs.validate-release.outputs.version }}

          # CHANGELOG에서 현재 버전 내용 추출
          if [ -f "docs/RELEASE_NOTES.md" ]; then
            RELEASE_NOTES_FILE="docs/RELEASE_NOTES.md"
          else
            # CHANGELOG에서 추출
            awk "/^## \[$VERSION\]/,/^## \[/{if(/^## \[/ && !/^## \[$VERSION\]/) exit; print}" CHANGELOG.md > release_notes.tmp
            RELEASE_NOTES_FILE="release_notes.tmp"
          fi

          # 릴리스 노트에 추가 정보 포함
          {
            if [ -f "$RELEASE_NOTES_FILE" ]; then
              cat "$RELEASE_NOTES_FILE"
            else
              echo "## 🎉 Release $VERSION"
              echo ""
              echo "This release includes various improvements and bug fixes."
            fi
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo '```bash'
            echo "npm install open-hangul-ai@$VERSION"
            echo '```'
            echo ""
            echo "## 🔗 Links"
            echo ""
            echo "- 📦 [npm Package](https://www.npmjs.com/package/open-hangul-ai)"
            echo "- 📚 [Documentation](https://github.com/kwangilkimkenny/open-hangul-ai/blob/main/README.md)"
            echo "- 🐛 [Report Issues](https://github.com/kwangilkimkenny/open-hangul-ai/issues)"
            echo "- 💬 [Discussions](https://github.com/kwangilkimkenny/open-hangul-ai/discussions)"
            echo ""
            echo "---"
            echo "*Made with ❤️ by [YATAV Team](https://yatavent.com)*"
          } > final_release_notes.md

          echo "Generated release notes:"
          cat final_release_notes.md

      - name: 📥 Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.validate-release.outputs.version }}

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-release.outputs.version }}
          name: 🎉 Release v${{ needs.validate-release.outputs.version }}
          body_path: final_release_notes.md
          draft: false
          prerelease: ${{ needs.validate-release.outputs.prerelease }}
          generate_release_notes: true
          discussion_category_name: 'Announcements'
          files: |
            hanview-react-dist/open-hangul-ai.es.js
            hanview-react-dist/open-hangul-ai.umd.js
            hanview-react-dist/open-hangul-ai.css
            hanview-react-dist/package.json

  # 📢 릴리스 알림
  notify-release:
    name: 📢 Notify Release
    runs-on: ubuntu-latest
    needs: [validate-release, github-release]
    if: needs.validate-release.outputs.prerelease == 'false'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Create Twitter announcement
        run: |
          VERSION=${{ needs.validate-release.outputs.version }}

          echo "## 📢 Social Media Announcement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Twitter/X Post" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "🎉 Open Hangul AI v$VERSION is now available!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 npm install open-hangul-ai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✨ What's new:" >> $GITHUB_STEP_SUMMARY
          echo "🇰🇷 Korean document support (HWPX)" >> $GITHUB_STEP_SUMMARY
          echo "🤖 AI integration" >> $GITHUB_STEP_SUMMARY
          echo "⚛️ React 18+ support" >> $GITHUB_STEP_SUMMARY
          echo "📱 TypeScript ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#React #TypeScript #Korean #OpenSource" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 https://github.com/kwangilkimkenny/open-hangul-ai" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📧 Prepare community announcements
        run: |
          VERSION=${{ needs.validate-release.outputs.version }}

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Community Posts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 **Reddit (r/reactjs)**" >> $GITHUB_STEP_SUMMARY
          echo "Title: [Release] Open Hangul AI v$VERSION - Korean Document Processing for React" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 **Dev.to**" >> $GITHUB_STEP_SUMMARY
          echo "Title: Open Hangul AI v$VERSION: The Complete Korean Document Library for React" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 **Hacker News**" >> $GITHUB_STEP_SUMMARY
          echo "Title: Open Hangul AI v$VERSION – Korean Document Processing Library for React" >> $GITHUB_STEP_SUMMARY

  # 📊 릴리스 후 분석
  post-release-analysis:
    name: 📊 Post-Release Analysis
    runs-on: ubuntu-latest
    needs: [validate-release, github-release]
    if: always()

    steps:
      - name: 📊 Release metrics
        run: |
          echo "## 📊 Release Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.validate-release.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ needs.validate-release.outputs.prerelease == 'true' && 'Pre-release' || 'Stable' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | v${{ needs.validate-release.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

  # 🧹 정리 작업
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [validate-release, github-release]
    if: always()

    steps:
      - name: 🧹 Clean up artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: release-${{ needs.validate-release.outputs.version }}
          failOnError: false

      - name: ✅ Release completed
        run: |
          echo "## ✅ Release Process Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Open Hangul AI v${{ needs.validate-release.outputs.version }} has been successfully released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. 📢 Share the release on social media" >> $GITHUB_STEP_SUMMARY
          echo "2. 📝 Update project documentation if needed" >> $GITHUB_STEP_SUMMARY
          echo "3. 👥 Monitor community feedback" >> $GITHUB_STEP_SUMMARY
          echo "4. 📊 Track download metrics" >> $GITHUB_STEP_SUMMARY
